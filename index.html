<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Epura Lesson Manager</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    #status {
      margin-top: 16px;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Lesson Manager</h1>

    <button id="loginBtn">
      Google Calendar に接続
    </button>

    <div id="status">
      未ログイン
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>

  <script>

    // ↓あとで差し替える
    const CLIENT_ID = 'ここにClient IDを貼る';

    const API_KEY = '';

    const DISCOVERY_DOC = 'https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest';

    const SCOPES = 'https://www.googleapis.com/auth/calendar';

    let tokenClient;
    let gapiInited = false;
    let gisInited = false;

    document.getElementById('loginBtn').onclick = handleAuthClick;

    function gapiLoaded() {
      gapi.load('client', initializeGapiClient);
    }

    async function initializeGapiClient() {
      await gapi.client.init({
        discoveryDocs: [DISCOVERY_DOC],
      });

      gapiInited = true;
      maybeEnableButtons();
    }

    function gisLoaded() {
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: SCOPES,
        callback: '',
      });

      gisInited = true;
      maybeEnableButtons();
    }

    function maybeEnableButtons() {
      if (gapiInited && gisInited) {
        document.getElementById('status').innerText = 'ログイン準備完了';
      }
    }

    async function handleAuthClick() {

      tokenClient.callback = async (resp) => {
        if (resp.error !== undefined) {
          throw(resp);
        }

        document.getElementById('status').innerText = 'Google Calendar 接続成功 ☕️';
      };

      if (gapi.client.getToken() === null) {
        tokenClient.requestAccessToken({prompt: 'consent'});
      } else {
        tokenClient.requestAccessToken({prompt: ''});
      }
    }

    gapiLoaded();
    gisLoaded();

  </script>

</body>
</html>
