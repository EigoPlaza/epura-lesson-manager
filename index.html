<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Epura Lesson Manager</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 28px;
    }

    .section-title {
      margin-top: 32px;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: bold;
      color: #666;
    }

    .lesson-row {
      background: white;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border-left: 6px solid #4f46e5;
    }

    .lesson-row.overdue {
      border-left-color: #ef4444;
      background: #fff8f8;
    }

    .top-line {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .time {
      font-size: 18px;
      font-weight: bold;
    }

    .student {
      font-weight: bold;
    }

    .lesson-name {
      color: #555;
    }

  .lesson-request {
    margin-top: 8px;
    font-size: 15px;
    font-weight: 600;
    color: #374151;
  }

    .note {
      background: #f9fafb;
      border-radius: 8px;
      padding: 10px;
      margin-top: 10px;
      white-space: pre-wrap;
      font-size: 14px;
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button,
    .btn-link {
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s;
    }

    .btn-primary {
      background: #4f46e5;
      color: white;
    }

    .btn-primary:hover {
      background: #4338ca;
    }

    .btn-gray {
      background: #e5e7eb;
      color: #555;
    }

    .btn-green {
      background: #10b981;
      color: white;
    }

    .btn-green:hover {
      background: #059669;
    }

    .btn-disabled {
      background: #d1d5db;
      color: #888;
      cursor: not-allowed;
    }

    .completed-label {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #dcfce7;
      color: #166534;
      font-size: 13px;
      font-weight: bold;
    }

    .empty {
      background: white;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      color: #777;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    @media (max-width: 640px) {
      body {
        padding: 10px;
      }

      .lesson-row {
        padding: 14px;
      }

      .buttons {
        flex-direction: column;
      }

      button,
      .btn-link {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Lesson Manager</h1>

  <div id="loading" class="loading">
    Loading lessons...
  </div>

  <div id="content"></div>
</div>

<script>

const WORKER_URL = 'https://epura-lesson-manager-api.eigoplaza.workers.dev';

// ← 講師ごとに変更
const CALENDAR_ID = 'fa0092befcd35f5f6f493118aea95c53de18b4eece3a460000db501409f17592@group.calendar.google.com';

async function loadLessons() {
  try {

    const response = await fetch(
      `${WORKER_URL}/?calendarId=${encodeURIComponent(CALENDAR_ID)}`
    );

    const data = await response.json();

    document.getElementById('loading').style.display = 'none';

    if (!data.success) {
      showError(data.error || 'Unknown error');
      return;
    }

    renderLessons(data.events || []);

  } catch (error) {
    console.error(error);
    showError(error.message);
  }
}

function renderLessons(events) {

  const content = document.getElementById('content');

  if (!events.length) {
    content.innerHTML = `
      <div class="empty">
        今日・明日の予定はありません ☕️
      </div>
    `;
    return;
  }

  const now = new Date();

  const overdue = [];
  const upcoming = [];

  events.forEach(event => {

    const start = new Date(event.start);

    if (!event.completed && start < now) {
      overdue.push(event);
    } else {
      upcoming.push(event);
    }
  });

  let html = '';

  if (overdue.length) {
    html += `<div class="section-title">⚠ 未完了レッスン</div>`;

    overdue.forEach(event => {
      html += createLessonHTML(event, true);
    });
  }

  if (upcoming.length) {
    html += `<div class="section-title">📅 予定</div>`;

    upcoming.forEach(event => {
      html += createLessonHTML(event, false);
    });
  }

  content.innerHTML = html;
}

function createLessonHTML(event, overdue) {

  const start = new Date(event.start);
  const end = new Date(event.end);

  const startTime = formatTime(start);
  const endTime = formatTime(end);
  const dateText = formatDate(start);

  const completeButton = event.completed
    ? `<div class="completed-label">Completed</div>`
    : event.canComplete
      ? `<button class="btn-green" onclick="completeLesson('${event.id}')">Complete</button>`
      : `<button class="btn-disabled" disabled>Complete</button>`;

  return `
    <div class="lesson-row ${overdue ? 'overdue' : ''}">

    <div class="top-line">
      <div class="time">${dateText} ${startTime} - ${endTime}</div>
      <div class="student">${escapeHtml(event.studentName || 'Unknown')}</div>
    </div>
    
    <div class="lesson-name">
      ${escapeHtml(event.serviceName || '')}
    </div>
    
    ${event.lessonRequest
      ? `<div class="lesson-request">📘 ${escapeHtml(event.lessonRequest)}</div>`
      : ''
    }

      ${event.studentNote
        ? `<div class="note">${escapeHtml(event.studentNote)}</div>`
        : ''
      }

      <div class="buttons">

        ${isValidUrl(event.lessonUrl)
          ? `<a class="btn-link btn-primary" href="${event.lessonUrl}" target="_blank">Lesson URL</a>`
          : `<button class="btn-disabled" disabled>Lesson URL</button>`
        }

        ${event.zoom
          ? `<a class="btn-link btn-gray" href="${event.zoom}" target="_blank">Zoom</a>`
          : ''
        }

        ${completeButton}

      </div>
    </div>
  `;
}

function completeLesson(eventId) {
  alert('Complete機能は次のステップで実装します ☕️');
}

function formatTime(date) {
  return date.toLocaleTimeString('ja-JP', {
    hour: '2-digit',
    minute: '2-digit'
  });
}

function formatDate(date) {
  return date.toLocaleDateString('ja-JP', {
    month: 'numeric',
    day: 'numeric'
  });
}

function isValidUrl(str) {
  return str &&
    (str.startsWith('http://') || str.startsWith('https://'));
}
  
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showError(message) {
  document.getElementById('content').innerHTML = `
    <div class="empty">
      Error: ${message}
    </div>
  `;
}

loadLessons();

</script>

</body>
</html>
