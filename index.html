<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Epura Lesson Manager</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    button {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    #status {
      margin-top: 16px;
      color: #444;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Lesson Manager</h1>

    <button id="loginBtn">
      Google Calendar に接続
    </button>

    <div id="status">
      未ログイン
    </div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>

<script>
  // あなたのクライアントID
  const CLIENT_ID = '931312830498-v22h9aslbeoain8gv9e90jefg7ds4d84.apps.googleusercontent.com';
  // カレンダーの読み取り・書き込み権限（必要に応じて変更してください）
  const SCOPES = 'https://www.googleapis.com/auth/calendar.events';

  let tokenClient;
  let gapiInited = false;
  let gisiInited = false;

  const loginBtn = document.getElementById('loginBtn');
  const statusDiv = document.getElementById('status');

  // 1. 各ライブラリの読み込み完了時に実行する初期化関数
  function gapiLoaded() {
    gapi.load('client', initializeGapiClient);
  }

  async function initializeGapiClient() {
    // カレンダーAPIのディスカロリドキュメントを読み込む
    await gapi.client.init({
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'],
    });
    gapiInited = true;
    maybeEnableButtons();
  }

  function gisLoaded() {
    // 認証用のクライアントを初期化
    tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: CLIENT_ID,
      scope: SCOPES,
      callback: '', // 後でポップアップ実行時に動的に設定
    });
    gisiInited = true;
    maybeEnableButtons();
  }

  function maybeEnableButtons() {
    if (gapiInited && gisiInited) {
      statusDiv.innerText = '準備完了（未ログイン）';
    }
  }

  // 2. ログインボタンが押された時の処理
  loginBtn.onclick = () => {
    tokenClient.callback = async (resp) => {
      if (resp.error !== undefined) {
        throw (resp);
      }
      statusDiv.innerText = 'ログイン成功！カレンダーに接続されました。';
      loginBtn.innerText = '接続済み';
      
      // ここで gapi.client.calendar.events.list(...) などを呼んで
      // カレンダーの予定を取得する処理を記述できます。
    };

    // 既存のトークンがあれば再利用、なければポップアップを表示
    if (gapi.client.getToken() === null) {
      tokenClient.requestAccessToken({prompt: 'consent'});
    } else {
      tokenClient.requestAccessToken({prompt: ''});
    }
  };
</script>

<script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
<script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

</body>
</html>
